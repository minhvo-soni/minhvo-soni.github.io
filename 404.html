<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>404 — Trang Không Tìm Thấy · SONI</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Be+Vietnam+Pro:wght@300;400&display=swap"
      rel="stylesheet"
    />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #050505;
        --gold: #D4AF37;
        --gold-dim: rgba(212, 175, 55, 0.18);
        --white: #ffffff;
        --white-40: rgba(255, 255, 255, 0.40);
        --white-08: rgba(255, 255, 255, 0.08);
        --white-04: rgba(255, 255, 255, 0.04);
      }

      html, body {
        height: 100%;
        background: var(--bg);
        color: var(--white);
        font-family: "Be Vietnam Pro", system-ui, sans-serif;
        overflow: hidden;
      }

      /* ── Noise grain overlay ── */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
      }

      /* ── Ambient glow ── */
      body::after {
        content: "";
        position: fixed;
        top: -20%;
        left: 50%;
        transform: translateX(-50%);
        width: 600px;
        height: 600px;
        background: radial-gradient(ellipse at center, rgba(212, 175, 55, 0.06) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }

      /* ── Layout ── */
      .page {
        position: relative;
        z-index: 1;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        gap: 0;
      }

      /* ── Glass card ── */
      .card {
        background: rgba(255, 255, 255, 0.04);
        border: 0.5px solid rgba(255, 255, 255, 0.10);
        backdrop-filter: blur(28px);
        -webkit-backdrop-filter: blur(28px);
        border-radius: 20px;
        padding: clamp(2.5rem, 6vw, 4rem) clamp(2rem, 6vw, 4.5rem);
        text-align: center;
        max-width: 480px;
        width: 100%;
        animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(28px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ── 404 number ── */
      .num {
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: clamp(88px, 18vw, 140px);
        font-weight: 600;
        line-height: 0.9;
        letter-spacing: -0.02em;
        color: var(--gold);
        display: block;
        margin-bottom: 1.25rem;
        animation: fadeUp 0.7s 0.1s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      /* ── Divider ── */
      .divider {
        width: 40px;
        height: 0.5px;
        background: var(--gold-dim);
        margin: 0 auto 1.5rem;
        animation: fadeUp 0.7s 0.18s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      /* ── Heading ── */
      .heading {
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: clamp(18px, 3.5vw, 24px);
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--white);
        margin-bottom: 0.75rem;
        animation: fadeUp 0.7s 0.22s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      /* ── Sub text ── */
      .sub {
        font-size: clamp(13px, 1.8vw, 14px);
        font-weight: 300;
        line-height: 1.75;
        letter-spacing: 0;
        color: var(--white-40);
        margin-bottom: 2.25rem;
        animation: fadeUp 0.7s 0.28s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      /* ── CTA button ── */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 1.75rem;
        border: 0.5px solid rgba(212, 175, 55, 0.45);
        background: rgba(212, 175, 55, 0.06);
        color: var(--gold);
        font-family: "Be Vietnam Pro", system-ui, sans-serif;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        text-decoration: none;
        border-radius: 100px;
        cursor: pointer;
        transition: background 0.25s, border-color 0.25s, color 0.25s;
        animation: fadeUp 0.7s 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
        touch-action: manipulation;
      }

      .btn:hover {
        background: rgba(212, 175, 55, 0.14);
        border-color: rgba(212, 175, 55, 0.7);
        color: #fff;
      }

      .btn svg { flex-shrink: 0; }

      /* ── SONI wordmark ── */
      .wordmark {
        position: fixed;
        bottom: max(1.75rem, env(safe-area-inset-bottom, 1.75rem));
        left: 50%;
        transform: translateX(-50%);
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.18);
        white-space: nowrap;
        z-index: 1;
        animation: fadeUp 0.8s 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="card">
        <span class="num">404</span>
        <div class="divider"></div>
        <h1 class="heading">Trang Không Tìm Thấy</h1>
        <p class="sub">
          Trang bạn đang tìm kiếm không tồn tại hoặc đã được di chuyển.<br />
          Hãy quay về trang chủ để khám phá portfolio.
        </p>
        <a href="/" class="btn">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
            <path d="M19 12H5M12 5l-7 7 7 7" />
          </svg>
          Về Trang Chủ
        </a>
      </div>
    </div>

    <p class="wordmark">SONI</p>
  </body>
</html>
